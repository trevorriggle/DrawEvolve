name = "drawevolve-backend"
main = "index.js"
compatibility_date = "2024-01-01"

# Required secrets (set via `wrangler secret put <NAME>`):
#   OPENAI_API_KEY              — OpenAI API key for GPT-4o Vision
#   SUPABASE_URL                — e.g. https://<project-ref>.supabase.co
#                                 (used for JWKS endpoint + PostgREST queries)
#   SUPABASE_JWT_ISSUER         — e.g. https://<project-ref>.supabase.co/auth/v1
#                                 (verified against the `iss` claim of every JWT)
#   SUPABASE_SERVICE_ROLE_KEY   — service_role JWT, bypasses RLS for ownership
#                                 checks + critique-history fetches. Treat as
#                                 god-mode credential — never commit, never log.
#
# Optional secrets:
#   ANOMALY_ALERT_WEBHOOK       — Slack (or compatible) incoming webhook URL.
#                                 Worker POSTs JSON when a single user crosses
#                                 5× their daily quota in a 1-hour window. If
#                                 unset, threshold crossings fall back to
#                                 console.error visible in `wrangler tail`.
#
# Phase 5a uses ES256 / JWKS verification (no SUPABASE_JWT_SECRET needed).
# The Worker fetches the JWKS at <SUPABASE_URL>/auth/v1/.well-known/jwks.json
# and caches it in module scope for 10 minutes (with kid-rotation refetch).
#
# See cloudflare-worker/DEPLOYMENT.md for the full setup runbook.

# Phase 5c — KV namespace for rate-limit counters and daily quotas.
# Trevor: create the namespace (`wrangler kv:namespace create drawevolve-quota`)
# and paste the returned id below before the next deploy.
[[kv_namespaces]]
binding = "QUOTA_KV"
id = "c0e8b7f10d7348d1b3844036cc7f18ed"

# Cost ceilings — launch-blocker hard caps that gate the OpenAI call.
# These run AFTER JWT + App Attest + tier rate limits; they're absolute
# spend/abuse circuit breakers, independent of TIER_LIMITS.
#
# Set both via plain `[vars]` entries (not secrets — these are operational
# knobs, not credentials). Missing OPENAI_DAILY_SPEND_CAP_USD falls back to
# the compiled-in $5.00 default; missing PER_USER_DAILY_TOKEN_CAP disables
# that ceiling entirely (no per-user enforcement). Both must be explicitly
# set in production.
#
# Recommended starting values (revisit as user volume / model cost change):
#   OPENAI_DAILY_SPEND_CAP_USD = "5.00"      # global $/day across all users
#   PER_USER_DAILY_TOKEN_CAP   = "50000"     # input + output tokens per user/day
#
# On breach:
#   spend cap   → HTTP 429 { error: "daily_spend_cap_exceeded" }
#   token cap   → HTTP 429 { error: "per_user_token_cap_exceeded" }
# Both reset implicitly at UTC midnight (new day = new KV key).

# Phase 5f — App Attest. APP_ATTEST_TEAM_ID and APP_ATTEST_BUNDLE_ID feed
# the rpId hash we check against authenticatorData on every request — must
# match the iOS bundle/team that signed the device's keys. APP_ATTEST_ENV
# selects the AAGUID we accept ('appattestdevelop' for dev, 'appattest' +
# 7 zero bytes for production); flip when promoting a build to App Store.
#
# The Apple App Attest Root CA pinned key lives as a source constant in
# middleware/app-attest.js (APPLE_ATTEST_ROOT_PUBKEY_HEX), NOT here — it's
# bundled with worker code so a deploy can never accidentally pair the
# wrong root with the wrong worker version. See DEPLOYMENT.md Phase 5f.
[vars]
APP_ATTEST_TEAM_ID = "S2RDF2D29N"          # 10-char Apple Team ID
APP_ATTEST_BUNDLE_ID = "com.rigtech.drawevolve"  # MUST match iOS PRODUCT_BUNDLE_IDENTIFIER
APP_ATTEST_ENV = "development"             # "development" | "production"
# Kill-switch: when "false" the protected routes (feedback, prompts)
# skip the App Attest gate entirely and run on Supabase JWT + per-user
# spend caps alone. iOS-side counterpart:
# AppAttestManager.isEnforcementEnabled — must agree, or the iOS side
# will keep round-tripping a doomed registration. Default in this file
# is "false" because the cert-chain validation hit a dead-end against
# real-device attestations during the initial real-hardware test pass;
# re-flip to "true" once `wrangler tail` shows a clean register +
# protected-route round-trip end-to-end.
APP_ATTEST_REQUIRED = "false"              # "true" | "false"

# Feature 1, Phase 1A — cross-drawing iterative coaching kill-switch.
# When "true", the feedback handler fetches the user's other recent
# drawings + their per-user opt-out preference, and (when both gates pass
# AND the registry has at least 3 rows) renders a registry block in the
# user-role message so the coach can reference other drawings by title.
# When "false" or unset, the entire feature is bypassed end-to-end —
# zero added Supabase reads, zero prompt-block delta, behavior is bit-for-
# bit identical to pre-feature production. The persisted critique entry
# still records prompt_config.crossDrawingContextEnabled (always false in
# this state) so post-launch analytics can distinguish flag-off requests
# from user-opt-out requests.
#
# Per-user opt-out lives in user_preferences.cross_drawing_context_enabled
# (migration 0011, default true). Settings UI ships in a later iOS PR.
CROSS_DRAWING_CONTEXT_ENABLED = "true"     # "true" | "false"

# Feature 2, Phase 2A — Eve conversational coach rate limits.
# Eve sends share the global DAILY_SPEND_CAP and PER_USER_DAILY_TOKEN_CAP
# with the critique flow (one wallet, two paths). The per-minute and
# per-day MESSAGE counts below are Eve-specific, so a user can have a
# rapid back-and-forth with Eve without burning their critique allowance.
#
# EVE_MAX_TURNS_PER_CONVERSATION is the per-conversation hard ceiling.
# At the limit, /v1/eve/conversations/:id/messages returns 409
# conversation_full and the client should prompt the user to start a new
# conversation. One "turn" = one user message + one assistant message.
EVE_PER_MINUTE_FREE = "10"
EVE_PER_MINUTE_PRO = "30"
EVE_PER_DAY_FREE = "60"
EVE_PER_DAY_PRO = "600"
EVE_MAX_TURNS_PER_CONVERSATION = "100"

# Phase 2A.1 — per-user daily token cap. Worst-case ceiling on any single
# user's combined critique + Eve token consumption in a UTC day. Pre-flight
# rejection in middleware/rate-limit.js → enforceCostCeilings fires 429
# per_user_token_cap_exceeded when current_tokens >= cap. Resets at UTC
# midnight (new day = new KV key, 48h TTL).
#
# 75,000 tokens/user/day ≈ ~$0.38/user/day worst case at gpt-5.1 pricing
# ($0.63/$5.00 per M for input/output). Heavy power user can do roughly
# 30–50 Eve turns + several critiques before hitting it. If real usage
# shows a user routinely hits the cap, that's a pricing-design signal
# (Pro tier should have a different cap), not a bug.
PER_USER_DAILY_TOKEN_CAP = "75000"

# Workers Logs — without this, console.log output is silently dropped at the
# Cloudflare edge. head_sampling_rate=1 captures 100% of requests; lower for
# cost control once volume warrants it.
[observability]
enabled = true
head_sampling_rate = 1
